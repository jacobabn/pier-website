<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Pier mark: stylized "P" with anchor base. Geometric, single-weight strokes, warm gradient. -->
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFB347"/>
      <stop offset="1" stop-color="#FF8A4C"/>
    </linearGradient>
  </defs>
  <!-- Rounded square frame -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="#1B1813" stroke="rgba(245,230,211,.08)" stroke-width="1"/>
  <!-- Pier post (vertical) -->
  <line x1="32" y1="14" x2="32" y2="50" stroke="url(#g)" stroke-width="4" stroke-linecap="round"/>
  <!-- Top bar (the P loop opens to the right) -->
  <path d="M32 14 Q46 14 46 26 Q46 38 32 38" stroke="url(#g)" stroke-width="4" stroke-linecap="round" fill="none"/>
  <!-- Anchor base (subtle horizontal pier deck) -->
  <line x1="20" y1="50" x2="44" y2="50" stroke="url(#g)" stroke-width="3" stroke-linecap="round" opacity="0.85"/>
  <!-- Two pier supports -->
  <line x1="24" y1="50" x2="22" y2="56" stroke="url(#g)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="40" y1="50" x2="42" y2="56" stroke="url(#g)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
</svg>
